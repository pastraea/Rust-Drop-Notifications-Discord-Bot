name: Bug report
description: Report a reproducible problem
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps.
      placeholder: |
        1. Run ...
        2. Execute ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs and output
      description: Paste relevant logs, without secrets.
      render: shell

  - type: input
    id: version
    attributes:
      label: App version
      placeholder: e.g. v0.1.0

  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: e.g. 22.14.0
